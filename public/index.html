<!doctype html>
<html>
    <head>
        <title>Oẳn tù tì vjp pro</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <h1>Oẳn tù tì vjp pro</h1>
            <a href="./index2.html">bản xịn</a>
            <a href="./index3.html">điện thoại</a>

            <div class="section">
                <h3>Vào Phòng</h3>
                <input id="name" placeholder="Nickname" />
                <input id="roomId" placeholder="Room ID" />
                <label>
                    Đạn tối đa
                    <input
                        data-setting="maxBullets"
                        type="number"
                        min="1"
                        max="99"
                        value="3"
                    />
                </label>
                <label>
                    Khiên liên tiếp tối đa
                    <input
                        data-setting="maxShieldStreak"
                        type="number"
                        min="1"
                        max="99"
                        value="5"
                    />
                </label>
                <button id="joinRoomBtn" onclick="joinRoom()">Vô</button>
            </div>

            <div class="section">
                <h3>Danh sách phòng</h3>
                <div id="noRoomMsg" style="display: none; color: #666;">No rooms available</div>
                <ul id="rooms"></ul>
            </div>

            <div class="section" id="game" style="display: none">
                <h3>Game hiện tại</h3>
                <p id="status"></p>
                <p id="timer"></p>
                <p id="gameSettingsInfo" class="game-settings-info">
                    Luật ván: Đạn tối đa 3 | Khiên liên tiếp tối đa 5
                </p>

                <div class="row">
                    <div class="col">
                        <h4><span id="myName">Bạn</span> <span id="myStatus">💬</span></h4>
                        <p id="bullets"></p>
                        <p id="shieldStreak"></p>
                    </div>

                    <div class="col">
                        <h4><span id="enemyName">Đối phương</span> <span id="enemyStatus">💬</span></h4>
                        <p id="enemyBullets"></p>
                        <p id="enemyShieldStreak"></p>
                    </div>
                </div>

                <div style="margin-top: 15px">
                    <button id="shootBtn" onclick="sendAction('shoot')">
                        Bắn (S)
                    </button>
                    <button id="shieldBtn" onclick="sendAction('shield')">
                        Khiên (D)
                    </button>
                    <button id="reloadBtn" onclick="sendAction('reload')">
                        Nạp (A)
                    </button>
                    <button onclick="restartGame()">Bắt đầu lại</button>
                    <button onclick="leaveRoom()" style="background-color: #dc3545; color: white;">Rời</button>
                </div>

                <div style="margin-top: 20px">
                    <h4>Trạng thái</h4>
                    <p id="log"></p>
                    <div id="result" class="result-container"></div>
                </div>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="script.js"></script>
    </body>
</html>
