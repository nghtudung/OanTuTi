<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Oẳn Tù Tì VJP PRO</title>
        <!-- <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;800&display=swap"
            rel="stylesheet"
        /> -->
        <link rel="stylesheet" href="style2.css" />
    </head>
    <body>
        <!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
        <header class="topbar">
            <h1 class="logo">OẲN TÙ TÌ <span>VJP PRO</span></h1>
            <div class="name-box">
                <input
                    id="name"
                    class="name-input"
                    placeholder="Tên bạn là gì?"
                    maxlength="20"
                />
                <button
                    class="theme-toggle"
                    id="themeToggle"
                    onclick="toggleTheme()"
                    title="Đổi giao diện"
                >
                    <span id="themeIcon">☀️</span>
                </button>
            </div>
        </header>

        <!-- ══ MAIN LAYOUT ══════════════════════════════════════════════════════ -->
        <main class="layout">
            <!-- LEFT: GAME PANEL -->
            <section class="game-panel">
                <!-- Status log bar -->
                <div class="log-bar">
                    <span id="log">Chờ vào phòng...</span>
                </div>

                <!-- Waiting state -->
                <div id="waitingState" class="waiting-state">
                    <p class="waiting-text">Chọn hoặc tạo phòng để bắt đầu →</p>
                </div>

                <!-- Game area (hidden until joined) -->
                <div id="game" style="display: none" class="game-area">
                    <!-- Player 2 (enemy) — top -->
                    <div class="player-zone enemy-zone">
                        <div class="player-name" id="enemyName">???</div>
                        <div class="player-stats">
                            <span class="stat-pill"
                                >🔫 Đạn:
                                <strong id="enemyBullets">0</strong></span
                            >
                            <span class="stat-pill"
                                >🛡️ Chuỗi khiên:
                                <strong id="enemyShieldStreak">0</strong></span
                            >
                            <span class="action-indicator" id="enemyStatus"
                                >💬</span
                            >
                        </div>
                    </div>

                    <!-- Timer -->
                    <div class="timer-block">
                        <div id="gameSettingsInfo" class="game-settings-info">
                            Luật ván: Đạn tối đa 3 | Khiên liên tiếp tối đa 5
                        </div>
                        <div class="timer-label" id="timerLabel">
                            THỜI GIAN CÒN LẠI
                        </div>
                        <div class="timer-number" id="timer">—</div>
                        <div class="vs-badge" id="vsBadge">VS</div>
                        <div
                            class="game-result"
                            id="result"
                            style="display: none"
                        ></div>
                    </div>

                    <!-- Player 1 (me) — bottom -->
                    <div class="player-zone my-zone">
                        <div class="player-stats">
                            <span class="stat-pill"
                                >🔫 Đạn: <strong id="bullets">0</strong></span
                            >
                            <span class="stat-pill"
                                >🛡️ Chuỗi:
                                <strong id="shieldStreak">0</strong></span
                            >
                            <span class="action-indicator" id="myStatus"
                                >💬</span
                            >
                        </div>

                        <!-- Action buttons -->
                        <div class="action-row">
                            <button
                                id="reloadBtn"
                                class="action-btn reload"
                                onclick="sendAction('reload')"
                                title="[A] Nạp đạn"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <polyline points="23 4 23 10 17 10" />
                                    <path
                                        d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"
                                    />
                                </svg>
                                <span>Nạp <kbd>A</kbd></span>
                            </button>
                            <button
                                id="shootBtn"
                                class="action-btn shoot"
                                onclick="sendAction('shoot')"
                                title="[S] Bắn"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="M4 9h10l2-4h3v8h-3l-2-4H4V9z" />
                                    <rect
                                        x="1"
                                        y="8"
                                        width="3"
                                        height="6"
                                        rx="1"
                                    />
                                    <circle cx="19" cy="17" r="2" />
                                </svg>
                                <span>Bắn <kbd>S</kbd></span>
                            </button>
                            <button
                                id="shieldBtn"
                                class="action-btn shield"
                                onclick="sendAction('shield')"
                                title="[D] Khiên"
                            >
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.25C17.25 23.15 21 18.25 21 13V7l-9-5z"
                                    />
                                </svg>
                                <span>Khiên <kbd>D</kbd></span>
                            </button>
                        </div>

                        <div class="player-name" id="myName">Bạn</div>
                    </div>

                    <!-- Bottom controls -->
                    <div class="game-controls">
                        <button class="ctrl-btn" onclick="restartGame()">
                            ↺ Ván mới <kbd>R</kbd>
                        </button>
                        <button class="ctrl-btn danger" onclick="leaveRoom()">
                            ✕ Rời phòng <kbd>E</kbd>
                        </button>
                    </div>
                </div>
                <!-- /game-area -->
            </section>

            <!-- RIGHT: ROOM SIDEBAR -->
            <aside class="room-sidebar">
                <div class="sidebar-header">Danh sách phòng</div>

                <div class="room-list-wrap">
                    <div id="noRoomMsg" class="no-room" style="display: none">
                        Chưa có phòng nào
                    </div>
                    <ul id="rooms" class="room-list"></ul>
                </div>

                <div class="manual-room">
                    <div class="manual-label">Phòng thủ công</div>
                    <div class="settings-grid">
                        <label>
                            Đạn tối đa
                            <input
                                data-setting="maxBullets"
                                class="room-input"
                                type="number"
                                min="1"
                                max="99"
                                value="3"
                            />
                        </label>
                        <label>
                            Khiên tối đa
                            <input
                                data-setting="maxShieldStreak"
                                class="room-input"
                                type="number"
                                min="1"
                                max="99"
                                value="5"
                            />
                        </label>
                    </div>
                    <div class="manual-row">
                        <input
                            id="roomId"
                            class="room-input"
                            placeholder="Nhập mã phòng"
                        />
                        <button
                            id="joinRoomBtn"
                            class="join-btn"
                            onclick="joinRoom()"
                        >
                            Vô
                        </button>
                    </div>
                </div>
            </aside>
        </main>

        <script src="/socket.io/socket.io.js"></script>
        <script src="script2.js"></script>
    </body>
</html>
